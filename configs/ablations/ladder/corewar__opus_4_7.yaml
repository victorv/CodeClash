# CoreWar ladder climbed by opus-4-7. Requires LLAMA_API_KEY in .env.
#   uv run codeclash ladder run configs/ablations/ladder/corewar__opus_4_7.yaml
tournament:
  rounds: 5
ladder_rules:
  min_round_win_fraction: 0.5   # advance only on a strict majority of rounds
  win_last_k: 1                 # ...and win the last K rounds (K=1 == just the final round)
game:
  name: CoreWar
  sims_per_round: 2000
player:
  agent: mini
  name: opus-4-7
  branch_init: human/pspace
  config:
    agent: !include mini/default.yaml
    model: !include mini/models/llama_opus_4_7.yaml
  push: True
prompts:
  game_description: |-
    Core War ladder
ladder: !include ablations/ladder/rungs/corewar.yaml
