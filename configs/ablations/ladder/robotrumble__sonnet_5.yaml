# RobotRumble ladder climbed by sonnet-5. Requires LLAMA_API_KEY in .env.
#   uv run codeclash ladder run configs/ablations/ladder/robotrumble__sonnet_5.yaml
tournament:
  rounds: 5
ladder_rules:
  min_round_win_fraction: 0.5   # advance only on a strict majority of rounds
  win_last_k: 1                 # ...and win the last K rounds (K=1 == just the final round)
game:
  name: RobotRumble
  sims_per_round: 250
  args:
    raw: false
player:
  agent: mini
  name: sonnet-5
  branch_init: human/anton/anton3000
  config:
    agent: !include mini/default.yaml
    model: !include mini/models/llama_sonnet_5.yaml
  push: True
prompts:
  game_description: |-
    RobotRumble ladder
ladder: !include ablations/ladder/rungs/robotrumble.yaml
